services:
  - type: web
    name: hybrid-search-api
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    plan: starter          # upgrade to standard for production
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hybrid-search-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hybrid-search-cache
          property: connectionString
      - key: REQUIRE_AUTH
        value: "true"
      - key: LOG_JSON
        value: "true"
      - key: WORKERS
        value: "2"
      # Set these in the Render dashboard — do NOT commit to git:
      # BRAVE_API_KEY, API_KEYS, OPENAI_API_KEY (if using OpenAI embeddings)
      # STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PUBLISHABLE_KEY

databases:
  - name: hybrid-search-db
    plan: starter
    databaseName: hybriddb
    user: hybriduser

  - name: hybrid-search-cache
    type: redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
